<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" role="img" aria-label="SEAM Seal — placeholder">
  <defs>
    <linearGradient id="seal-generic-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d2d2b"/>
      <stop offset="1" stop-color="#1a1a19"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M 24 28 L 216 28 L 216 132 C 216 196, 174 240, 120 268 C 66 240, 24 196, 24 132 Z"
