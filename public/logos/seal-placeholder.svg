  <!-- Divider -->
  <line x1="84" y1="180" x2="156" y2="180" stroke="#D78825" stroke-width="1" opacity="0.5"/>
  <!-- Sub-wordmark -->
  <text x="120" y="202" text-anchor="middle" fill="#D78825"
    font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="3.5">SEAM</text>
  <!-- Placeholder ribbon -->
  <text x="120" y="226" text-anchor="middle" fill="#8e8e8b"
    font-family="system-ui, -apple-system, sans-serif" font-size="8" letter-spacing="2.5" opacity="0.7">PLACEHOLDER</text>
</svg>
